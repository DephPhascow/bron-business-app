mutation UpdateBusiness($pk: Int!, $input: UpdateBusiness!) {
  updateBusiness(pk: $pk, input: $input) {
    pk
    name
    latitude
    longitude
    taxpayerIdentificationNumber
    personalIdentificationNumber
    websiteUrl
    offersUrl
    addressAll
    descriptionAll
    logoUrl
    contactPhone
    workTime { ...WorkTimeFields }
    breakTime { ...WorkTimeFields }
  }
}
