mutation UpdateEmployees($pk: Int!, $input: UpdateEmployee!, $lang: String!) {
  updateEmployees(pk: $pk, input: $input) {
    pk
    role
    isActive
    user {
      pk
      fullName
      phone
      email
      imageUrl
    }
    specializations {
      pk
      name(lang: $lang)
    }
    services {
      ...ServiceFields
    }
  }
}
