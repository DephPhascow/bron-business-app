query BusinessWorkspace($businessId: Int!, $lang: String!) {
  business(pk: $businessId) {
    pk
    name
    logoUrl
    contactPhone
    address(lang: $lang)
    workTime { ...WorkTimeFields }
    breakTime { ...WorkTimeFields }
    middleStars
    reviewsCount
    reviews {
      reviewMark
      comments
    }
    employees {
      pk
      role
      isActive
      userId
      user {
        pk
        fullName
        phone
        email
        imageUrl
      }
      specializations {
        pk
        name(lang: $lang)
      }
      services {
        ...ServiceFields
      }
    }
    galleryImages {
      pk
      imageUrl
    }
    bookings {
      pk
      bookingDate
      employeeId
      userId
      status
      user {
        fullName
      }
      services {
        cost
        service {
          pk
          name(lang: $lang)
        }
      }
    }
  }
}

